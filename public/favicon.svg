<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- White Background -->
  <rect width="48" height="48" fill="#FFFFFF" />
  
  <!-- Gray Hollow Large Square -->
  <rect x="6" y="6" width="36" height="36" fill="none" stroke="#4B5563" stroke-width="4" rx="2" stroke-linejoin="round" />
  
  <!-- Dark Red Triangle, shifted 2px to the right -->
  <!-- Original points: M14 12 L14 36 L34.78 24 Z -->
  <path d="M16 12 L16 36 L36.78 24 Z" fill="#991B1B" />
  
  <!-- White Asterisk, shifted 2px right and 1px down -->
  <!-- Previous x=21, y=28 -> New x=23, y=29 -->
  <text 
    x="23" 
    y="29" 
    fill="white" 
    font-family="Arial, sans-serif" 
    font-size="24" 
    font-weight="bold" 
    text-anchor="middle" 
    dominant-baseline="central"
  >*</text>
</svg>